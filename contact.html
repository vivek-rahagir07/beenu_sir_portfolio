<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Beenu Kumar Taneja for Corporate Training and Coaching.">
    <title>Contact | Beenu Kumar Taneja</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Navigation -->
    <nav id="navbar">
        <a href="index.html" class="logo">
            <img src="assets/images/signature.png" alt="Signature" class="signature-logo">
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="experience.html">Experience</a></li>
            <li><a href="expertise.html">Expertise</a></li>
            <li><a href="vision.html">Vision</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <section class="page-header container">
        <h2 class="section-title">Connect with Me</h2>

        <div class="carousel-container glass">
            <div class="carousel-track">
                <!-- LinkedIn Slide -->
                <div class="carousel-slide active">
                    <a href="https://www.linkedin.com/in/beenutaneja/" target="_blank" class="carousel-link">
                        <img src="assets/images/linkedin.png" alt="LinkedIn Profile">
                        <div class="carousel-caption">
                            <i class="fab fa-linkedin"></i>
                            <span>LinkedIn Profile</span>
                        </div>
                    </a>
                </div>
                <!-- Instagram Slide -->
                <div class="carousel-slide">
                    <a href="https://www.instagram.com/beenu.taneja/?hl=en" target="_blank" class="carousel-link">
                        <img src="assets/images/instagram.png" alt="Instagram Profile">
                        <div class="carousel-caption">
                            <i class="fab fa-instagram"></i>
                            <span>Instagram Profile</span>
                        </div>
                    </a>
                </div>
                <!-- Twitter Slide -->
                <div class="carousel-slide">
                    <a href="https://x.com/TanejaBeenu" target="_blank" class="carousel-link">
                        <img src="assets/images/twitter.png" alt="Twitter Profile">
                        <div class="carousel-caption">
                            <i class="fab fa-twitter"></i>
                            <span>Twitter / X</span>
                        </div>
                    </a>
                </div>
            </div>

            <button class="carousel-btn prev" aria-label="Previous Slide">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button class="carousel-btn next" aria-label="Next Slide">
                <i class="fas fa-chevron-right"></i>
            </button>

            <div class="carousel-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

        <div class="grid" style="margin-top: 60px;">
            <div class="card glass">
                <h3>Contact Details</h3>
                <ul class="detail-list">
                    <li>
                        <i class="fas fa-phone-alt" style="color: var(--accent);"></i>
                        <a href="tel:8743088888" style="color: inherit; text-decoration: none;">87430 88888</a>
                    </li>
                    <li>
                        <i class="fas fa-envelope" style="color: var(--accent);"></i>
                        <a href="mailto:beenu.taneja@gmail.com"
                            style="color: inherit; text-decoration: none;">beenu.taneja@gmail.com</a>
                    </li>
                    <li>
                        <i class="fas fa-map-marker-alt" style="color: var(--accent);"></i>
                        <span>New Delhi, India</span>
                    </li>
                </ul>
            </div>
            <div class="card glass">
                <h3>Direct Inquiry</h3>
                <form onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                    <input type="text" placeholder="Your Name"
                        style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: white;">
                    <input type="email" placeholder="Your Email"
                        style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: white;">
                    <textarea placeholder="Your Message" rows="5"
                        style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: white;"></textarea>
                    <button type="submit" class="btn" style="width: 100%; cursor: pointer;">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/beenutaneja/" target="_blank" aria-label="LinkedIn"><i
                    class="fab fa-linkedin"></i></a>
            <a href="https://www.instagram.com/beenu.taneja/?hl=en" target="_blank" aria-label="Instagram"><i
                    class="fab fa-instagram"></i></a>
            <a href="https://x.com/TanejaBeenu" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
            <a href="#" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
        </div>
        <a href="#" aria-label="IMDB"><i class="fab fa-imdb"></i></a>
        </div>
        <p style="margin-top: 20px; color: var(--text-muted); font-size: 0.8rem;">&copy; 2024 Beenu Kumar Taneja. All
            Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
